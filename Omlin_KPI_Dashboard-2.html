<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omlin Consultancy — KPI Dashboard</title>
<style>
:root{
  --hull:#1E3D2E;
  --hull-2:#2A5240;
  --ink:#21261F;
  --ink-soft:#5B6459;
  --paper:#F6F5F1;
  --panel:#FFFFFF;
  --line:#E1DED3;
  --line-soft:#EDEBE2;
  --green:#2FA365;
  --green-soft:#E1F5E9;
  --red:#B4432A;
  --red-soft:#FAE8E1;
  --amber:#D9772A;
  --amber-soft:#FBEADA;
  --steel:#1E3D2E;
  --steel-soft:#E7F1EC;
  --brown:#8A5A2E;
  --brown-soft:#F3E9DC;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
  --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--steel-soft);}

/* ---------- layout ---------- */
#shell{display:flex;min-height:100vh;}
#sidebar{
  width:230px;flex:0 0 230px;background:var(--hull);color:#DCE6DC;
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;
  transition:transform .2s ease; z-index:40;
}
#sidebar .brand{
  padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1);
}
#sidebar .brand .mark{
  font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#9BC2A6;text-transform:uppercase;
}
#sidebar .brand h1{
  margin:6px 0 0;font-size:17px;font-weight:700;letter-spacing:.01em;line-height:1.25;color:#fff;
}
#sidebar nav{flex:1;padding:14px 10px;overflow-y:auto;}
.navgroup{margin-bottom:4px;}
.navlink{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  color:#C3D6C7;text-decoration:none;font-size:13.5px;font-weight:600;cursor:pointer;
  border:1px solid transparent;
}
.navlink:hover{background:rgba(255,255,255,.08);color:#fff;}
.navlink.active{background:var(--amber);color:#fff;border-color:var(--amber);}
.navlink .ico{width:16px;text-align:center;font-size:14px;}
.subnav{margin:2px 0 10px 26px;display:none;flex-direction:column;gap:1px;}
.subnav.open{display:flex;}
.subnav a{
  padding:7px 10px;font-size:12.5px;color:#A9C4AE;text-decoration:none;border-radius:6px;font-weight:600;
}
.subnav a:hover{color:#fff;background:rgba(255,255,255,.07);}
.subnav a.active{color:#fff;background:rgba(255,255,255,.14);}
#sidebar .foot{
  padding:14px 18px 18px;border-top:1px solid rgba(255,255,255,.1);
  font-family:var(--mono);font-size:10.5px;color:#7FA089;line-height:1.6;
}
#main{flex:1;margin-left:230px;min-width:0;}
#topbar{
  position:sticky;top:0;z-index:30;background:rgba(243,245,244,.92);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;
  justify-content:space-between;gap:16px;
}
#topbar .title{font-size:15px;font-weight:700;}
#topbar .title .eyebrow{
  display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--ink-soft);
  text-transform:uppercase;font-weight:600;margin-bottom:2px;
}
#topbar .whoami{display:flex;align-items:center;gap:10px;}
#topbar .whoami-name{
  font-size:12.5px;color:var(--ink-soft);white-space:nowrap;
}
#topbar .whoami-name strong{color:var(--ink);}
#topbar .datepill{
  font-family:var(--mono);font-size:12px;background:var(--steel-soft);color:var(--steel);
  padding:6px 10px;border-radius:7px;font-weight:700;
}

/* ---------- login screen ---------- */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--hull);padding:20px;
}
.login-card{
  background:var(--panel);border-radius:14px;padding:34px 32px 30px;width:100%;max-width:360px;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.login-brand{text-align:center;margin-bottom:18px;}
.login-brand .mark{
  font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-soft);text-transform:uppercase;
}
.login-brand h1{margin:6px 0 0;font-size:16px;font-weight:700;color:var(--ink);}
#loginHeading{margin:0 0 18px;font-size:15px;font-weight:700;color:var(--ink);text-align:center;}
#loginScreen .field{margin-bottom:14px;}
.login-error{
  display:none;background:var(--red-soft);color:var(--red);border-radius:8px;padding:9px 11px;
  font-size:12px;margin-top:4px;line-height:1.5;
}
.syncbadge{
  display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;font-weight:700;
  padding:6px 10px;border-radius:7px;text-transform:uppercase;letter-spacing:.03em;background:var(--line-soft);color:var(--ink-soft);
}
.syncbadge i{width:7px;height:7px;border-radius:50%;background:var(--ink-soft);display:inline-block;}
.syncbadge.local{background:var(--line-soft);color:var(--ink-soft);}
.syncbadge.local i{background:var(--ink-soft);}
.syncbadge.connecting{background:var(--amber-soft);color:#7A5313;}
.syncbadge.connecting i{background:var(--amber);animation:pulse 1s infinite;}
.syncbadge.live{background:var(--green-soft);color:var(--green);}
.syncbadge.live i{background:var(--green);}
.syncbadge.error{background:var(--red-soft);color:var(--red);}
.syncbadge.error i{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
#menubtn{display:none;background:none;border:1px solid var(--line);border-radius:7px;padding:7px 10px;cursor:pointer;font-size:15px;}
.page{display:none;padding:24px 28px 60px;max-width:1180px;}
.page.active{display:block;}

/* ---------- primitives ---------- */
.grid{display:grid;gap:14px;}
.kpi-grid{grid-template-columns:repeat(4,1fr);}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;
}
.card h3{margin:0 0 4px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;}
.card .big{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--hull);line-height:1.1;margin-top:6px;}
.card .sub{font-size:11.5px;color:var(--ink-soft);margin-top:6px;}
.section{margin-top:26px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.section-head h2{font-size:15px;margin:0;font-weight:700;}
.section-head p{margin:2px 0 0;font-size:12px;color:var(--ink-soft);}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{
  text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--ink-soft);border-bottom:1px solid var(--line);padding:8px 10px;font-weight:600;white-space:nowrap;
}
td{padding:8px 10px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--paper);}
.tablewrap{overflow-x:auto;border-radius:10px;}
.stamp{
  display:inline-block;font-family:var(--mono);font-weight:800;font-size:10.5px;letter-spacing:.06em;
  padding:4px 9px;border-radius:5px;text-transform:uppercase;transform:rotate(-2deg);border:1.5px solid currentColor;
}
.stamp.sent{color:var(--green);background:var(--green-soft);}
.stamp.notsent{color:var(--red);background:var(--red-soft);}
.stamp.pending{color:var(--amber);background:var(--amber-soft);}
.stamp.logged{color:var(--steel);background:var(--steel-soft);}
.btn{
  font-family:var(--sans);font-weight:700;font-size:12.5px;border-radius:8px;padding:9px 16px;
  border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;
}
.btn:hover{border-color:var(--ink-soft);}
.btn.primary{background:var(--hull);border-color:var(--hull);color:#fff;}
.btn.primary:hover{background:var(--hull-2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
input:disabled{opacity:.6;cursor:not-allowed;background:var(--line-soft);}
.btn.danger{color:var(--red);border-color:var(--red);background:var(--red-soft);}
.btn.sm{padding:5px 10px;font-size:11.5px;border-radius:6px;}
.btn.ghost{background:transparent;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select,.field textarea{
  font-family:var(--sans);font-size:13px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;
  background:#fff;color:var(--ink);
}
.field textarea{resize:vertical;min-height:56px;}
.formrow{display:flex;gap:12px;flex-wrap:wrap;}
.formrow .field{flex:1;min-width:160px;}
.subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.subtabs button{
  font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:8px 14px;
  border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;
}
.subtabs button.active{background:var(--hull);border-color:var(--hull);color:#fff;}
.searchbar{display:flex;gap:10px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.searchbar input[type=text],.searchbar input[type=date],.searchbar select{
  font-family:var(--sans);font-size:12.5px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;
}
.checklist-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid var(--line-soft);}
.checklist-row:last-child{border-bottom:none;}
.checklist-row .name{flex:1;font-size:13px;font-weight:600;}
.checklist-row .meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);}
.toggle{
  display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:0 0 auto;
}
.toggle button{
  border:none;background:#fff;padding:7px 12px;font-family:var(--mono);font-size:11px;font-weight:800;
  letter-spacing:.03em;cursor:pointer;color:var(--ink-soft);
}
.toggle button.on.sentbtn{background:var(--green);color:#fff;}
.toggle button.on.notbtn{background:var(--red);color:#fff;}
.progress{height:8px;background:var(--line-soft);border-radius:99px;overflow:hidden;margin-top:8px;}
.progress > div{height:100%;background:var(--steel);}
.empty{padding:34px 10px;text-align:center;color:var(--ink-soft);font-size:13px;}
.empty .big-ico{font-size:26px;margin-bottom:8px;}
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--hull);color:#fff;padding:11px 18px;border-radius:9px;font-size:12.5px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .25s ease;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.25);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.notice{
  border:1px solid var(--line);background:var(--steel-soft);color:var(--hull-2);border-radius:10px;
  padding:12px 14px;font-size:12.5px;line-height:1.55;margin-bottom:18px;
}
.notice.warn{background:var(--amber-soft);color:#7A5313;border-color:#EAD3A0;}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
.chart-wrap{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px 6px;}
.chart-title{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);margin-top:6px;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;}
.rankbadge{
  font-family:var(--mono);font-weight:800;font-size:10.5px;background:var(--brown-soft);color:var(--brown);
  padding:2px 6px;border-radius:5px;
}
.hint{font-size:11.5px;color:var(--ink-soft);}
a.linklike{color:var(--steel);text-decoration:none;font-weight:700;cursor:pointer;}
.freq-tag{font-family:var(--mono);font-size:10px;color:var(--brown);background:var(--brown-soft);padding:2px 6px;border-radius:5px;}
@media(max-width:880px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;}
  #menubtn{display:inline-block;}
  .page{padding:18px 14px 60px;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <span class="mark">Omlin Consultancy</span>
      <h1>KPI &amp; Report Tracking</h1>
    </div>
    <h2 id="loginHeading">Welcome back</h2>
    <div class="field">
      <label>Name</label>
      <input id="loginName" type="text" placeholder="Your name" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
    </div>
    <div class="field" id="accessCodeField" style="display:none;">
      <label>Staff Access Code</label>
      <input id="loginAccessCode" type="password" placeholder="Given to you by your admin" autocomplete="off">
    </div>
    <div id="loginError" class="login-error"></div>
    <button class="btn primary" id="authSubmitBtn" style="width:100%;margin-top:8px;" onclick="submitAuthForm()">Log In</button>
    <p class="hint" style="text-align:center;margin-top:16px;">
      <a class="linklike" id="authToggleLink" onclick="toggleSignupMode()">New officer? Create an account</a>
    </p>
  </div>
</div>

<div id="shell" style="display:none;">
  <aside id="sidebar">
    <div class="brand">
      <span class="mark">Omlin Consultancy</span>
      <h1>KPI &amp; Report<br>Tracking</h1>
    </div>
    <nav id="navroot"></nav>
    <div class="foot">Local backup always on.<br>Team sync via Firebase.</div>
  </aside>

  <div id="main">
    <div id="topbar">
      <button id="menubtn" onclick="toggleSidebar()">☰</button>
      <div class="title"><span class="eyebrow" id="crumb">Overview</span><span id="pagetitle">Dashboard</span></div>
      <div class="whoami">
        <span class="syncbadge local" id="syncBadge"><i></i>Local device only</span>
        <span class="datepill" id="todaypill"></span>
        <span class="whoami-name">Logged in as <strong id="whoamiName">—</strong></span>
        <button class="btn sm ghost" onclick="doLogout()">Log out</button>
      </div>
    </div>

    <div id="pages"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function fmtDateLong(s){
  if(!s) return '—';

/* ---------- ISO week helpers (for KPA weekly bucket) ---------- */
function isoWeekInfo(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(),0,4));
  const week = 1 + Math.round(((d - firstThursday) / 86400000 - 3 + ((firstThursday.getUTCDay()+6)%7)) / 7);
  const monday = new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  monday.setUTCDate(monday.getUTCDate() - dayNum);
  const sunday = new Date(monday); sunday.setUTCDate(monday.getUTCDate()+6);
  return {year:d.getUTCFullYear(), week, key:d.getUTCFullYear()+'-W'+pad2(week),
    mondayStr: monday.toISOString().slice(0,10), sundayStr: sunday.toISOString().slice(0,10)};
}

/* ---------- Firebase Auth + Firestore layer ---------- */
let auth = null, db = null;
let currentUser = null;
let CLOUD_MODE = false;
let FIREBASE_READY = false;
let pollStarted = false;
let syncStatus = 'local'; // 'local' | 'connecting' | 'live' | 'error'

function initFirebase(){
  if(FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && window.firebase){
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
      db = firebase.firestore();
      CLOUD_MODE = true;
      FIREBASE_READY = true;
      auth.onAuthStateChanged(async (user)=>{
        currentUser = user;
        if(user){ await onLoginSuccess(); }
        else { showLoginScreen(); }
      });
    }catch(e){
      console.error('Firebase init failed', e);
      CLOUD_MODE = false; FIREBASE_READY = false;
      showLoginScreen();
    }
  } else {
    FIREBASE_READY = false;
    showLoginScreen();
  }
  updateSyncBadge();
}
function toDbRow(e){
  return { id:e.id, category:e.category, date:e.date, client:e.client||null, status:e.status||null,
    officer:e.officer||null, notes:e.notes||null, line:e.line||null, received:e.received||null,
    delivered:e.delivered||null, turnaround:(e.turnaround===undefined?null:e.turnaround),
    late: !!e.late, ts: e.ts || new Date().toISOString() };
}
async function cloudFetchAll(){
  if(!CLOUD_MODE) return null;
  try{
    const snap = await db.collection('report_entries').get();
    syncStatus = 'live';
    return snap.docs.map(d=>d.data());
  }catch(e){ console.error('Cloud fetch failed', e); syncStatus = 'error'; return null; }
}
async function cloudUpsert(row){
  if(!CLOUD_MODE) return;
  try{
    await db.collection('report_entries').doc(row.id).set(toDbRow(row));
    syncStatus = 'live';
  }catch(e){ console.error('Cloud save failed', e); syncStatus = 'error'; toast('Saved locally — cloud sync failed'); }
  updateSyncBadge();
}
async function cloudDelete(id){
  if(!CLOUD_MODE) return;
  try{
    await db.collection('report_entries').doc(id).delete();
    syncStatus = 'live';
  }catch(e){ console.error('Cloud delete failed', e); syncStatus = 'error'; }
  updateSyncBadge();
}
async function cloudBulkUpsert(arr){
  if(!CLOUD_MODE || !arr.length) return;
  const BATCH = 400;
  let failed = 0;
  for(let i=0; i<arr.length; i+=BATCH){
    const chunk = arr.slice(i, i+BATCH);
    let ok = false;
    for(let attempt=0; attempt<2 && !ok; attempt++){
      try{
        const batch = db.batch();
        chunk.forEach(row=> batch.set(db.collection('report_entries').doc(row.id), toDbRow(row)));
        await batch.commit();
        ok = true;
      }catch(e){
        if(attempt===1){ console.error('Cloud bulk save failed for batch starting at '+i, e); }
      }
    }
    if(!ok) failed += chunk.length;
  }
  if(failed>0){
    syncStatus = 'error';
    toast(`Cloud sync: ${failed} of ${arr.length} entries failed to upload — saved locally, will retry on next refresh`);
  } else {
    syncStatus = 'live';
  }
  updateSyncBadge();
}
async function cloudClearAll(){
  if(!CLOUD_MODE) return;
  try{
    const snap = await db.collection('report_entries').get();
    const docs = snap.docs;
    const BATCH = 400;
    for(let i=0; i<docs.length; i+=BATCH){
      const batch = db.batch();
      docs.slice(i, i+BATCH).forEach(d=> batch.delete(d.ref));
      await batch.commit();
    }
    syncStatus = 'live';
  }catch(e){ console.error('Cloud clear failed', e); syncStatus = 'error'; }
  updateSyncBadge();
}
async function refreshFromCloud(showToast){
  if(!CLOUD_MODE) return;
  syncStatus = 'connecting'; updateSyncBadge();
  const data = await cloudFetchAll();
  if(data){
    ENTRIES = data;
    saveLocalEntries(ENTRIES);
    if(showToast) toast('Refreshed from cloud');
  }
  updateSyncBadge();
  renderPage(currentPage);
}
function updateSyncBadge(){
  const el = document.getElementById('syncBadge');

  const map = {
    local:      {cls:'local',  label:'Local device only'},
    connecting: {cls:'connecting', label:'Syncing…'},
    live:       {cls:'live',   label:'Live — synced'},
    error:      {cls:'error',  label:'Sync error'},
  };
  const s = CLOUD_MODE ? map[syncStatus] : map.local;
  el.className = 'syncbadge '+s.cls;
  el.innerHTML = `<i></i>${s.label}`;
}

function upsertEntry(entry, matchFn){
  const idx = ENTRIES.findIndex(matchFn);
  if(idx>=0){ entry.id = ENTRIES[idx].id; ENTRIES[idx] = entry; }
  else { entry.id = uid(); ENTRIES.push(entry); }
  saveLocalEntries(ENTRIES);
  if(CLOUD_MODE) cloudUpsert(entry);
  return ENTRIES;
}
function addEntry(entry){
  entry.id = uid();
  ENTRIES.push(entry);
  saveLocalEntries(ENTRIES);
  if(CLOUD_MODE) cloudUpsert(entry);
  return entry;
}
function deleteEntry(id){
  ENTRIES = ENTRIES.filter(e=>e.id!==id);
  saveLocalEntries(ENTRIES);
  if(CLOUD_MODE) cloudDelete(id);
}
function saveEntries(arr){
  ENTRIES = arr;
  saveLocalEntries(ENTRIES);
}
function replaceAllEntries(arr, resync){
  ENTRIES = arr;
  saveLocalEntries(ENTRIES);
  if(CLOUD_MODE && resync){
    cloudClearAll().then(()=>cloudBulkUpsert(ENTRIES));
  } else if(CLOUD_MODE){
    cloudBulkUpsert(ENTRIES);
  }
}

/* ============================================================
   MASTER CLIENT LISTS — editable roster used by checklists & forms
   Seeded once from the source workbook, then fully editable
   (add / remove) and synced the same way as report entries.
   ============================================================ */
const LS_MASTER = 'omlin_master_clients_v1';
const MASTER_CATS = ['FCL','LCL','BB','MBL_CLIENT','MBL_LINE'];
let MASTER = {FCL:[], LCL:[], BB:[], MBL_CLIENT:[], MBL_LINE:[]};

function seedMasterFromWorkbook(){
  return {
    FCL: DATA.fcl_clients.map(c=>({id:uid(), name:c.client})),
    LCL: DATA.lcl_clients.map(c=>({id:uid(), name:c.client})),
    BB:  DATA.bb_clients.map(c=>({id:uid(), name:c.client})),
    MBL_CLIENT: DATA.mbl_clients.map(n=>({id:uid(), name:n})),
    MBL_LINE:   DATA.mbl_lines_all.map(n=>({id:uid(), name:n})),
  };
}
function loadLocalMaster(){
  try{ const raw = localStorage.getItem(LS_MASTER); return raw? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function saveLocalMaster(){ try{ localStorage.setItem(LS_MASTER, JSON.stringify(MASTER)); }catch(e){} }

function toDbMasterRow(cat, item){ return {id:item.id, category:cat, name:item.name}; }
function groupMasterRows(rows){
  const m = {FCL:[], LCL:[], BB:[], MBL_CLIENT:[], MBL_LINE:[]};
  rows.forEach(r=>{ if(m[r.category]) m[r.category].push({id:r.id, name:r.name}); });
  return m;
}
async function cloudFetchMaster(){
  if(!CLOUD_MODE) return null;
  try{
    const snap = await db.collection('master_clients').get();
    return snap.docs.map(d=>d.data());
  }catch(e){ console.error('Master fetch failed', e); return null; }
}
async function cloudUpsertMaster(cat, item){
  if(!CLOUD_MODE) return;
  try{ await db.collection('master_clients').doc(item.id).set(toDbMasterRow(cat,item)); }
  catch(e){ console.error('Master save failed', e); toast('Saved locally — cloud sync failed'); }
}
async function cloudDeleteMaster(id){
  if(!CLOUD_MODE) return;
  try{ await db.collection('master_clients').doc(id).delete(); }
  catch(e){ console.error('Master delete failed', e); }
}
async function cloudBulkUpsertMaster(){
  if(!CLOUD_MODE) return;
  const rows = [];
  MASTER_CATS.forEach(cat=> MASTER[cat].forEach(item=> rows.push(toDbMasterRow(cat,item))));
  if(!rows.length) return;
  const BATCH = 400;
  for(let i=0; i<rows.length; i+=BATCH){
    const chunk = rows.slice(i, i+BATCH);
    try{
      const batch = db.batch();
      chunk.forEach(row=> batch.set(db.collection('master_clients').doc(row.id), row));
      await batch.commit();
    }catch(e){ console.error('Master bulk seed failed for batch starting at '+i, e); }
  }
}
async function syncMasterFromCloud(){
  const rows = await cloudFetchMaster();
  if(rows===null) return;
  if(rows.length===0){
    await cloudBulkUpsertMaster();
  } else {
    MASTER = groupMasterRows(rows);
    saveLocalMaster();
  }
  renderPage(currentPage);
}
function addMasterClient(cat, rawName){
  const name = (rawName||'').trim();
  if(!name){ toast('Enter a name first'); return; }
  const dupe = MASTER[cat].some(item=>item.name.toLowerCase()===name.toLowerCase());
  if(dupe){ toast('Already on the list'); return; }
  const item = {id:uid(), name};
  MASTER[cat].push(item);
  saveLocalMaster();
  if(CLOUD_MODE) cloudUpsertMaster(cat, item);
  toast('Added '+name);
}
function removeMasterClient(cat, id){
  const item = MASTER[cat].find(i=>i.id===id);
  if(!item) return;
  if(!confirm('Remove "'+item.name+'" from this list? Reports already logged for them are kept.')) return;
  MASTER[cat] = MASTER[cat].filter(i=>i.id!==id);
  saveLocalMaster();
  if(CLOUD_MODE) cloudDeleteMaster(id);
  renderMasterRowsOnly(cat);
  toast('Removed '+item.name);
}

let currentPage = 'dashboard';

function buildNav(){
  const root = document.getElementById('navroot');
  root.innerHTML = '';
  NAV.forEach(item=>{
    const grp = document.createElement('div');
    grp.className='navgroup';
    const a = document.createElement('div');
    a.className='navlink'; a.dataset.page=item.id;
    a.innerHTML = `<span class="ico">${item.icon}</span><span>${item.label}</span>`;
    a.onclick = ()=>{
      if(item.sub){
        const sn = grp.querySelector('.subnav');
        const isOpen = sn.classList.contains('open');
        document.querySelectorAll('.subnav').forEach(s=>s.classList.remove('open'));
        if(!isOpen){ sn.classList.add('open'); goTo(item.sub[0].id); }
      } else {
        goTo(item.id);
      }
    };
    grp.appendChild(a);
    if(item.sub){
      const sn = document.createElement('div');
      sn.className='subnav';
      item.sub.forEach(s=>{
        const link = document.createElement('a');
        link.textContent = s.label; link.dataset.page = s.id;
        link.onclick = (e)=>{ e.stopPropagation(); goTo(s.id); };
        sn.appendChild(link);
      });
      grp.appendChild(sn);
    }
    root.appendChild(grp);
  });
}

function parentOf(pageId){
  for(const item of NAV){
    if(item.id===pageId) return item;
    if(item.sub && item.sub.find(s=>s.id===pageId)) return item;
  }
  return null;
}

function goTo(pageId){
  currentPage = pageId;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pageEl = document.getElementById('page-'+pageId);
  if(pageEl) pageEl.classList.add('active');

  document.querySelectorAll('.navlink').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.subnav a').forEach(n=>n.classList.remove('active'));
  const parent = parentOf(pageId);
  if(parent){
    const topLink = document.querySelector(`.navlink[data-page="${parent.id}"]`);
    if(topLink) topLink.classList.add('active');
    if(parent.sub){
      const subEl = topLink.parentElement.querySelector('.subnav');
      subEl.classList.add('open');
      const subLink = document.querySelector(`.subnav a[data-page="${pageId}"]`);
      if(subLink) subLink.classList.add('active');
      document.getElementById('crumb').textContent = parent.label.replace('&amp;','&');
      document.getElementById('pagetitle').textContent = parent.sub.find(s=>s.id===pageId).label;
    } else {
      document.getElementById('crumb').textContent = 'Overview';
      document.getElementById('pagetitle').textContent = parent.label.replace('&amp;','&');
    }
  }
  renderPage(pageId);
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0,0);
}

/* ============================================================
   MINI CHART BUILDERS (pure SVG, no deps)
   ============================================================ */
function svgLineChart(points, opts){
  opts = opts||{};
  const w = opts.w||560, h = opts.h||160, pad = {l:34,r:12,t:14,b:22};
  const vals = points.map(p=>p.y).filter(v=>v!==null && v!==undefined && !isNaN(v));
  let min = opts.min!==undefined?opts.min:Math.min(0,...vals);
  let max = opts.max!==undefined?opts.max:Math.max(...vals, 0.0001);
  if(max===min) max = min+1;
  const iw = w-pad.l-pad.r, ih = h-pad.t-pad.b;
  const n = points.length;
  const x = i => pad.l + (n<=1?0:(i/(n-1))*iw);
  const y = v => pad.t + ih - ((v-min)/(max-min))*ih;
  let path = '', started=false;
  points.forEach((p,i)=>{
    if(p.y===null||p.y===undefined||isNaN(p.y)){ started=false; return; }
    path += (started?'L':'M')+x(i).toFixed(1)+','+y(p.y).toFixed(1)+' ';
    started = true;
  });
  const gridLines = 3;
  let grid = '';
  for(let g=0; g<=gridLines; g++){
    const gy = pad.t + (ih/gridLines)*g;
    const val = max - (max-min)*(g/gridLines);
    grid += `<line x1="${pad.l}" y1="${gy.toFixed(1)}" x2="${w-pad.r}" y2="${gy.toFixed(1)}" stroke="var(--line-soft)" stroke-width="1"/>`;
    grid += `<text x="2" y="${(gy+3).toFixed(1)}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)">${opts.fmt?opts.fmt(val):val.toFixed(1)}</text>`;
  }
  const stepLabel = Math.max(1, Math.ceil(n/6));
  let labels = '';
  points.forEach((p,i)=>{
    if(i%stepLabel===0 || i===n-1){
      labels += `<text x="${x(i).toFixed(1)}" y="${h-6}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)" text-anchor="middle">${escapeHtml(p.label)}</text>`;
    }
  });
  const dots = points.map((p,i)=> (p.y===null||p.y===undefined||isNaN(p.y))?'':`<circle cx="${x(i).toFixed(1)}" cy="${y(p.y).toFixed(1)}" r="2.2" fill="${opts.color||'var(--steel)'}"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    ${grid}
    <path d="${path}" fill="none" stroke="${opts.color||'var(--steel)'}" stroke-width="2"/>
    ${dots}
    ${labels}
  </svg>`;
}

function svgBarChart(points, opts){
  opts = opts||{};
  const w = opts.w||560, h = opts.h||160, pad = {l:34,r:12,t:14,b:22};
  const vals = points.map(p=>p.y||0);
  const max = opts.max!==undefined?opts.max:Math.max(...vals, 0.0001);
  const iw = w-pad.l-pad.r, ih = h-pad.t-pad.b;
  const n = points.length;
  const bw = Math.max(2,(iw/n)*0.62);
  const gap = (iw/n);
  let bars='';
  points.forEach((p,i)=>{
    const bh = max>0 ? ((p.y||0)/max)*ih : 0;
    const bx = pad.l + i*gap + (gap-bw)/2;
    const by = pad.t + ih - bh;
    bars += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="1.5" fill="${p.color||opts.color||'var(--steel)'}"/>`;
  });
  const gridLines=3; let grid='';
  for(let g=0; g<=gridLines; g++){
    const gy = pad.t + (ih/gridLines)*g;
    const val = max - (max/gridLines)*g;
    grid += `<line x1="${pad.l}" y1="${gy.toFixed(1)}" x2="${w-pad.r}" y2="${gy.toFixed(1)}" stroke="var(--line-soft)" stroke-width="1"/>`;
    grid += `<text x="2" y="${(gy+3).toFixed(1)}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)">${opts.fmt?opts.fmt(val):val.toFixed(0)}</text>`;
  }
  const stepLabel = Math.max(1, Math.ceil(n/6));
  let labels='';
  points.forEach((p,i)=>{
    if(i%stepLabel===0 || i===n-1){
      const bx = pad.l + i*gap + gap/2;
      labels += `<text x="${bx.toFixed(1)}" y="${h-6}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)" text-anchor="middle">${escapeHtml(p.label)}</text>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${grid}${bars}${labels}</svg>`;
}

   DASHBOARD — filterable by Day / Week / Month / Year / All / Custom
   ============================================================ */
function categoryClientList(cat){
  if(cat==='FCL') return MASTER.FCL.map(c=>c.name);
  if(cat==='LCL') return MASTER.LCL.map(c=>c.name);
  if(cat==='BB') return MASTER.BB.map(c=>c.name);
  return [];
}

let dashPeriod = 'all';           // 'day' | 'week' | 'month' | 'year' | 'all' | 'custom'
let dashRefDate = todayStr();     // anchor date for day / week nav
let dashYear = new Date().getFullYear();
let dashMonth = MONTHS[new Date().getMonth()];
let dashCustomFrom = todayStr();
let dashCustomTo = todayStr();

function setDashPeriod(p){
  dashPeriod = p;
  renderDashboard();
}
function shiftDay(delta){
  const d = new Date(dashRefDate+'T00:00:00');
  d.setDate(d.getDate()+delta);
  dashRefDate = d.toISOString().slice(0,10);
  renderDashboard();
}
function shiftWeek(delta){ shiftDay(delta*7); }
function shiftMonth(delta){
  let idx = MONTHS.indexOf(dashMonth) + delta;
  let y = dashYear;
  while(idx<0){ idx+=12; y--; }
  while(idx>11){ idx-=12; y++; }
  dashMonth = MONTHS[idx]; dashYear = y;
  renderDashboard();
}
function shiftYear(delta){ dashYear += delta; renderDashboard(); }

/* ---- live (log-based) aggregation for day / week / custom ---- */
function rangeClientProgress(cat, fromDate, toDate){
  const entries = loadEntries().filter(e=>e.category===cat && e.date>=fromDate && e.date<=toDate);
  const sentClients = new Set(entries.filter(e=>e.status==='sent').map(e=>e.client));
  const sentEvents = entries.filter(e=>e.status==='sent').length;
  return {distinctSent: sentClients.size, total: categoryClientList(cat).length, sentEvents};
}
function rangeKpaStatus(fromDate, toDate){
  const entries = loadEntries().filter(e=>e.category==='KPA' && e.date>=fromDate && e.date<=toDate);
  return {weeksLogged: entries.length, weeksSent: entries.filter(e=>e.status==='sent').length};
}
function rangeMbl(fromDate, toDate){
  const entries = loadEntries().filter(e=>e.category==='MBL' && e.date>=fromDate && e.date<=toDate);
  const shipments = entries.length;
  const late = entries.filter(e=>e.late).length;
  const avg = shipments? entries.reduce((s,e)=>s+(e.turnaround||0),0)/shipments : null;
  return {shipments, late, avg_turnaround:avg, pct_late: shipments? late/shipments : null};
}

/* ---- historical (workbook) aggregation for month / year ---- */
function aggMonthlyLike(monthlyArr, year, month){
  const rows = monthlyArr.filter(r=>r.year===year && (month===null || r.month===month));
  let total_sent=0, client_days=0;
  rows.forEach(r=>{ total_sent+=r.total_sent||0; client_days+=r.client_days||0; });
  return {total_sent, client_days, avg_rate: client_days? total_sent/client_days : null, rows: rows.length};
}
function aggMonthlyAll(monthlyArr){
  let total_sent=0, client_days=0;
  monthlyArr.forEach(r=>{ total_sent+=r.total_sent||0; client_days+=r.client_days||0; });
  return {total_sent, client_days, avg_rate: client_days? total_sent/client_days : null};
}
function aggMonthlyAllKpa(){
  let due=0, sub=0;
  DATA.kpa_monthly.forEach(r=>{ due+=r.weeks_due||0; sub+=r.weeks_submitted||0; });
  return {weeks_due:due, weeks_submitted:sub, compliance: due? sub/due : null};
}
function aggKpaHist(year, month){
  if(month===null){
    const yr = DATA.kpa_yearly.find(r=>r.year===year);
    if(yr) return {weeks_due:yr.weeks_due, weeks_submitted:yr.weeks_submitted, compliance:yr.compliance};
  }
  const rows = DATA.kpa_monthly.filter(r=>r.year===year && (month===null || r.month===month));
  let due=0, sub=0;
  rows.forEach(r=>{ due+=r.weeks_due||0; sub+=r.weeks_submitted||0; });
  return {weeks_due:due, weeks_submitted:sub, compliance: due? sub/due : null};
}
function aggMblHist(year, month){
  const monAbbrev = month? month.slice(0,3) : null;
  const rows = DATA.mbl_monthly.filter(r=>{
    const parts = r.month.split('-'); const y = parseInt(parts[1]);
    return y===year && (monAbbrev===null || parts[0]===monAbbrev);
  });
  let shipments=0, late=0, weighted=0;
  rows.forEach(r=>{ shipments+=r.shipments||0; late+=r.late||0; if(r.avg_turnaround!==null && r.avg_turnaround!==undefined) weighted += r.avg_turnaround*(r.shipments||0); });
  return {shipments, late, avg_turnaround: shipments? weighted/shipments : null, pct_late: shipments? late/shipments : null};
}

function availableYears(){
  const ys = new Set();
  DATA.kpa_monthly.forEach(r=>ys.add(r.year));
  ys.add(new Date().getFullYear());
  return Array.from(ys).sort();
}

function periodRangeLabel(){
  if(dashPeriod==='day') return fmtDateLong(dashRefDate);
  if(dashPeriod==='week'){ const w = isoWeekInfo(new Date(dashRefDate+'T00:00:00')); return `Week of ${w.mondayStr} – ${w.sundayStr}`; }
  if(dashPeriod==='month') return `${dashMonth} ${dashYear}`;
  if(dashPeriod==='year') return `${dashYear}`;
  if(dashPeriod==='custom') return `${dashCustomFrom} – ${dashCustomTo}`;
  return 'All-time';
}

function filterBarHtml(){
  const pills = [['day','Day'],['week','Week'],['month','Month'],['year','Year'],['all','All-time'],['custom','Custom']];
  const pillHtml = pills.map(([id,label])=>`<button class="${dashPeriod===id?'active':''}" onclick="setDashPeriod('${id}')">${label}</button>`).join('');

  let context = '';
  if(dashPeriod==='day'){
    context = `<button class="btn sm ghost" onclick="shiftDay(-1)">← Prev</button>
      <input type="date" value="${dashRefDate}" onchange="dashRefDate=this.value; renderDashboard();">
      <button class="btn sm ghost" onclick="shiftDay(1)">Next →</button>
      <button class="btn sm" onclick="dashRefDate=todayStr(); renderDashboard();">Today</button>`;
  } else if(dashPeriod==='week'){
    context = `<button class="btn sm ghost" onclick="shiftWeek(-1)">← Prev</button>
      <input type="date" value="${dashRefDate}" onchange="dashRefDate=this.value; renderDashboard();">
      <button class="btn sm ghost" onclick="shiftWeek(1)">Next →</button>
      <button class="btn sm" onclick="dashRefDate=todayStr(); renderDashboard();">This week</button>`;
  } else if(dashPeriod==='month'){
    context = `<button class="btn sm ghost" onclick="shiftMonth(-1)">← Prev</button>
      <select onchange="dashMonth=this.value; renderDashboard();">${MONTHS.map(m=>`<option value="${m}" ${m===dashMonth?'selected':''}>${m}</option>`).join('')}</select>
      <select onchange="dashYear=parseInt(this.value); renderDashboard();">${availableYears().map(y=>`<option value="${y}" ${y===dashYear?'selected':''}>${y}</option>`).join('')}</select>
      <button class="btn sm ghost" onclick="shiftMonth(1)">Next →</button>`;
  } else if(dashPeriod==='year'){
    context = `<button class="btn sm ghost" onclick="shiftYear(-1)">← Prev</button>
      <select onchange="dashYear=parseInt(this.value); renderDashboard();">${availableYears().map(y=>`<option value="${y}" ${y===dashYear?'selected':''}>${y}</option>`).join('')}</select>
      <button class="btn sm ghost" onclick="shiftYear(1)">Next →</button>`;
  } else if(dashPeriod==='custom'){
    context = `<span class="hint">From</span><input type="date" value="${dashCustomFrom}" onchange="dashCustomFrom=this.value; renderDashboard();">
      <span class="hint">To</span><input type="date" value="${dashCustomTo}" onchange="dashCustomTo=this.value; renderDashboard();">`;
  }

  return `<div class="panel" style="margin-bottom:18px;">
    <div class="subtabs" style="margin-bottom:${context?'10px':'0'};">${pillHtml}</div>
    ${context? `<div class="searchbar" style="margin-bottom:0;">${context}</div>` : ''}
  </div>`;
}

function renderDashboard(){
  const html = `
  <div class="notice">
    <strong>Client status-reporting performance</strong> across KPA, MBL/Guarantee, FCL, LCL and Break Bulk.
    Filter by day, week, month, year or a custom range — Month/Year/All-time pull from the source KPI workbook;
    Day/Week/Custom show what's actually been logged in <strong>Log a Report</strong> for that window.
  </div>

  ${filterBarHtml()}

  <div class="section" style="margin-top:0;">
    <div class="section-head"><h2>Performance — ${periodRangeLabel()}</h2><p>${dashPeriod==='month'||dashPeriod==='year'||dashPeriod==='all' ? 'Source: KPI workbook' : 'Source: entries logged in this app'}</p></div>
    ${kpiCardsForPeriod()}
  </div>

  <div class="section two-col">

function renderTripleLine(){
  // align by "Mon YYYY" key across the three series
  const key = r => r.month.slice(0,3)+' '+String(r.year).slice(2);
  const allKeys = [];
  const seen = new Set();
  [DATA.fcl_monthly, DATA.lcl_monthly, DATA.bb_monthly].forEach(series=>{
    series.forEach(r=>{ const k=key(r); if(!seen.has(k)){ seen.add(k); allKeys.push(k);} });
  });
  function seriesFor(data){
    const map = {}; data.forEach(r=> map[key(r)] = r.avg_rate);
    return allKeys.map(k=>({label:k, y: map[k]!==undefined? map[k]: null}));
  }
  const w=1080,h=170;
  const fcl = seriesFor(DATA.fcl_monthly), lcl = seriesFor(DATA.lcl_monthly), bb = seriesFor(DATA.bb_monthly);
  function pathFor(points,color){
    const pad={l:34,r:12,t:14,b:22}; const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
    const vals = points.map(p=>p.y).filter(v=>v!==null && !isNaN(v));
    const max = Math.max(...vals, 0.01);
    const n=points.length;
    const x = i => pad.l + (n<=1?0:(i/(n-1))*iw);
    const y = v => pad.t + ih - (v/max)*ih;
    let path='',started=false;
    points.forEach((p,i)=>{
      if(p.y===null||isNaN(p.y)){started=false;return;}
      path += (started?'L':'M')+x(i).toFixed(1)+','+y(p.y).toFixed(1)+' ';
      started=true;
    });
    return {path,max,x,y,pad,ih};
  }
  const maxAll = Math.max(...[...fcl,...lcl,...bb].map(p=>p.y||0), 0.05);
  function drawPath(points,color){
    const pad={l:34,r:12,t:14,b:22}; const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
    const n=points.length;
    const x = i => pad.l + (n<=1?0:(i/(n-1))*iw);
    const y = v => pad.t + ih - (v/maxAll)*ih;
    let path='',started=false;
    points.forEach((p,i)=>{
      if(p.y===null||isNaN(p.y)){started=false;return;}
      path += (started?'L':'M')+x(i).toFixed(1)+','+y(p.y).toFixed(1)+' ';
      started=true;
    });
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>`;
  }
  const pad={l:34,r:12,t:14,b:22}; const ih=h-pad.t-pad.b;
  let grid=''; const gridLines=3;
  for(let g=0; g<=gridLines; g++){
    const gy = pad.t + (ih/gridLines)*g;
    const val = maxAll - (maxAll/gridLines)*g;
    grid += `<line x1="${pad.l}" y1="${gy.toFixed(1)}" x2="${w-pad.r}" y2="${gy.toFixed(1)}" stroke="var(--line-soft)" stroke-width="1"/>`;
    grid += `<text x="2" y="${(gy+3).toFixed(1)}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)">${Math.round(val*100)}%</text>`;
  }
  const n = allKeys.length;
  const stepLabel = Math.max(1, Math.ceil(n/8));
  let labels='';
  const iw=w-pad.l-pad.r;
  allKeys.forEach((k,i)=>{
    if(i%stepLabel===0 || i===n-1){
      const bx = pad.l + (n<=1?0:(i/(n-1))*iw);
      labels += `<text x="${bx.toFixed(1)}" y="${h-6}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)" text-anchor="middle">${escapeHtml(k)}</text>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${grid}${drawPath(fcl,'var(--brown)')}${drawPath(lcl,'var(--green)')}${drawPath(bb,'var(--amber)')}${labels}</svg>`;
}

function reportingYears(){
  const ys = new Set();
  DATA.kpa_monthly.forEach(r=>ys.add(r.year));
  DATA.fcl_monthly.forEach(r=>ys.add(r.year));
  DATA.lcl_monthly.forEach(r=>ys.add(r.year));
  DATA.bb_monthly.forEach(r=>ys.add(r.year));
  DATA.mbl_monthly.forEach(r=>ys.add(parseInt(r.month.split('-')[1])));
  loadEntries().forEach(e=>{ if(e.date) ys.add(parseInt(e.date.slice(0,4))); });
  ys.add(new Date().getFullYear());
  return Array.from(ys).sort((a,b)=>b-a);
}
function daysInMonth(year, monthIdx){ return new Date(year, monthIdx+1, 0).getDate(); }
function weeksForSelection(){
  if(!rpt.year) return [];
  let fromDate, toDate;
  if(rpt.month){
    const mi = MONTHS.indexOf(rpt.month);
    fromDate = rpt.year+'-'+pad2(mi+1)+'-01';
    toDate = rpt.year+'-'+pad2(mi+1)+'-'+pad2(daysInMonth(rpt.year, mi));
  } else {
    fromDate = rpt.year+'-01-01';
    toDate = rpt.year+'-12-31';
  }
  const weeks = []; const seen = new Set();
  let d = new Date(fromDate+'T00:00:00');
  const end = new Date(toDate+'T00:00:00');
  while(d <= end){
    const info = isoWeekInfo(d);
    if(!seen.has(info.key)){ seen.add(info.key); weeks.push(info); }
    d.setDate(d.getDate()+1);
  }
  return weeks;
}
function daysForSelection(){
  if(rpt.week){
    const info = weeksForSelection().find(w=>w.key===rpt.week);
    if(!info) return [];
    const days = []; let d = new Date(info.mondayStr+'T00:00:00');
    for(let i=0;i<7;i++){ days.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
    return days;
  }
  if(rpt.month){
    const mi = MONTHS.indexOf(rpt.month);
    const n = daysInMonth(rpt.year, mi);
    const days = [];
    for(let i=1;i<=n;i++) days.push(rpt.year+'-'+pad2(mi+1)+'-'+pad2(i));
    return days;
  }
  return [];
}
function setRptField(field, value){
  rpt[field] = value;
  if(field==='type'){ rpt.client=''; rpt.year=''; rpt.month=''; rpt.week=''; rpt.day=''; }
  else if(field==='client'){ rpt.year=''; rpt.month=''; rpt.week=''; rpt.day=''; }
  else if(field==='year'){ rpt.month=''; rpt.week=''; rpt.day=''; }
  else if(field==='month'){ rpt.week=''; rpt.day=''; }
  else if(field==='week'){ rpt.day=''; }
  renderReportPage();
}

}
function reportPeriodLabel(){
  if(rpt.day) return fmtDateLong(rpt.day);
  if(rpt.week){ const info = weeksForSelection().find(w=>w.key===rpt.week); return info? `Week of ${info.mondayStr} – ${info.sundayStr}` : ''; }
  if(rpt.month) return rpt.month+' '+rpt.year;
  if(rpt.year) return String(rpt.year);
  return 'All time';
}
function reportMatchesDate(e){
  if(!e.date) return false;
  if(rpt.day) return e.date === rpt.day;
  if(rpt.week){
    const info = weeksForSelection().find(w=>w.key===rpt.week);
    return info ? (e.date >= info.mondayStr && e.date <= info.sundayStr) : false;
  }
  if(rpt.month){
    const mi = MONTHS.indexOf(rpt.month);
    const from = rpt.year+'-'+pad2(mi+1)+'-01';
    const to = rpt.year+'-'+pad2(mi+1)+'-'+pad2(daysInMonth(rpt.year, mi));
    return e.date>=from && e.date<=to;
  }
  if(rpt.year) return e.date.slice(0,4) === String(rpt.year);
  return true;
}
function reportFilteredEntries(){
  if(!rpt.type) return [];
  return loadEntries().filter(e => e.category===rpt.type
    && (rpt.client===''|| e.client===rpt.client)
    && reportMatchesDate(e))
    .sort((a,b)=> b.date.localeCompare(a.date) || (b.ts||'').localeCompare(a.ts||''));
}
function renderReportResults(){
  const el = document.getElementById('reportResults');
  if(!el) return;
  if(!rpt.type){ el.innerHTML = '<div class="panel"><div class="empty">Select a report type above to generate a report.</div></div>'; return; }

  const rows = reportFilteredEntries();
  const typeLabel = (REPORT_TYPES.find(t=>t.value===rpt.type)||{}).label || rpt.type;
  const isMbl = rpt.type==='MBL';

  let summaryHtml;
  if(isMbl){
    const shipments = rows.length;
    const late = rows.filter(e=>e.late).length;
    const avg = shipments? rows.reduce((s,e)=>s+(e.turnaround||0),0)/shipments : null;
    summaryHtml = `<div class="grid kpi-grid">
      ${kpiCard('Shipments', shipments, 'Guarantee deliveries logged')}
      ${kpiCard('Avg Turnaround', avg!==null? num(avg,1)+'h':'—', 'Within this selection')}
      ${kpiCard('Late', late, 'Beyond 24h SLA')}
      ${kpiCard('% Late', shipments? pct(late/shipments):'—', 'Of shipments in selection')}
    </div>`;
  } else {
    const sent = rows.filter(e=>e.status==='sent').length;
    const notSent = rows.filter(e=>e.status==='not_sent').length;
    const total = rows.length;
    summaryHtml = `<div class="grid kpi-grid">
      ${kpiCard('Sent', sent, 'Reports marked sent')}
      ${kpiCard('Not Sent', notSent, 'Reports marked not sent')}
      ${kpiCard('Total Logged', total, 'Entries in this selection')}
      ${kpiCard('Send Rate', total? pct(sent/total):'—', 'Of logged entries')}
    </div>`;
  }

  const colCount = isMbl ? 8 : 5;
  const tableHead = isMbl
    ? `<tr><th>BL Number</th><th>Client</th><th>Received</th><th>Delivered</th><th>Turnaround</th><th>SLA</th><th>Officer</th><th>Notes</th></tr>`
    : `<tr><th>Date</th><th>Client</th><th>Status</th><th>Officer</th><th>Notes</th></tr>`;

  const tableRows = rows.length ? rows.map(e=>{
    if(isMbl){
      const slaBadge = e.late? '<span class="stamp notsent">Late</span>' : '<span class="stamp sent">On-time</span>';
      return `<tr>
        <td>${escapeHtml(e.bl)||'—'}</td>
        <td style="white-space:normal;">${escapeHtml(e.client)||'—'}</td>
        <td>${fmtDateTime(e.received)}</td>
        <td>${fmtDateTime(e.delivered)}</td>
        <td>${e.turnaround!==null&&e.turnaround!==undefined? num(e.turnaround,1)+'h':'—'}</td>
        <td>${slaBadge}</td>
        <td>${escapeHtml(e.officer)||'—'}</td>
        <td style="white-space:normal;">${escapeHtml(e.notes)||'—'}</td>
      </tr>`;
    }
    let statusBadge = '<span class="stamp pending">Pending</span>';
    if(e.status==='sent') statusBadge = '<span class="stamp sent">Sent</span>';
    else if(e.status==='not_sent') statusBadge = '<span class="stamp notsent">Not sent</span>';
    return `<tr>
      <td>${e.date}</td>
      <td style="white-space:normal;">${escapeHtml(e.client)||'—'}</td>
      <td>${statusBadge}</td>
      <td>${escapeHtml(e.officer)||'—'}</td>
      <td style="white-space:normal;">${escapeHtml(e.notes)||'—'}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="${colCount}" style="font-family:var(--sans);color:var(--ink-soft);">No entries logged for this selection yet.</td></tr>`;

  el.innerHTML = `
  <div class="section-head"><h2>${typeLabel}${rpt.client? ' · '+escapeHtml(rpt.client) : ' · All Clients'}</h2><p>${reportPeriodLabel()}</p></div>
  ${summaryHtml}
  <div class="section-head" style="margin-top:20px;"><h2>Matching Entries</h2><p>${rows.length} result(s)</p></div>
  <div class="tablewrap panel" style="padding:0;">
    <table><thead>${tableHead}</thead>
    <tbody>${tableRows}</tbody></table>
  </div>
  <div style="margin-top:12px;display:flex;gap:10px;">
    <button class="btn sm" onclick="exportReportCsv()">Export CSV</button>
    <button class="btn sm primary" onclick="generateReportPdf()">Download PDF</button>
  </div>`;
}
function exportReportCsv(){
  const rows = reportFilteredEntries();
  const header = ['date','category','client','bl','status','officer','notes','line','received','delivered','turnaround','late'];
  const lines = [header.join(',')];
  rows.forEach(e=>{
    const line = header.map(k=>{
      let v = e[k]; v = (v===undefined||v===null)?'':String(v);
      if(v.includes(',')||v.includes('"')) v = '"'+v.replace(/"/g,'""')+'"';
      return v;
    });
    lines.push(line.join(','));
  });
  downloadFile('omlin_report_'+(rpt.type||'all')+'_'+todayStr()+'.csv', lines.join('\n'), 'text/csv');
}
function generateReportPdf(){
  if(!rpt.type){ toast('Select a report type first'); return; }
  if(!window.jspdf || !window.jspdf.jsPDF){ toast('PDF library did not load — check your internet connection'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const pageWidth = doc.internal.pageSize.getWidth();
  const typeLabel = (REPORT_TYPES.find(t=>t.value===rpt.type)||{}).label || rpt.type;
  const rows = reportFilteredEntries();

  // Title — bold, centered
  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.text(typeLabel, pageWidth/2, 52, {align:'center'});

  // Filter summary — client / year / month / week / day, only what's set, centered below the title
  doc.setFont('helvetica','normal');
  doc.setFontSize(10.5);
  const parts = ['Client: ' + (rpt.client || 'All Clients')];
  if(rpt.year) parts.push('Year: '+rpt.year);
  if(rpt.month) parts.push('Month: '+rpt.month);
  if(rpt.week){
    const info = weeksForSelection().find(w=>w.key===rpt.week);
    if(info) parts.push('Week: '+info.mondayStr+' to '+info.sundayStr);
  }
  if(rpt.day) parts.push('Day: '+rpt.day);
  const line1 = parts.slice(0, Math.ceil(parts.length/2)).join('    |    ');
  const line2 = parts.slice(Math.ceil(parts.length/2)).join('    |    ');
  doc.text(line1, pageWidth/2, 72, {align:'center'});
  if(line2) doc.text(line2, pageWidth/2, 87, {align:'center'});

  doc.setDrawColor(210,205,195);
  doc.line(40, 98, pageWidth-40, 98);

  // Summary line
  let summaryParts;
  const isMbl = rpt.type==='MBL';
  if(isMbl){
    const shipments = rows.length;
    const late = rows.filter(e=>e.late).length;
    const avg = shipments? (rows.reduce((s,e)=>s+(e.turnaround||0),0)/shipments) : null;
    summaryParts = [
      'Shipments: '+shipments,
      'Avg Turnaround: '+(avg!==null? avg.toFixed(1)+'h' : '—'),
      'Late: '+late,
      '% Late: '+(shipments? ((late/shipments)*100).toFixed(1)+'%' : '—')
    ];
  } else {
    const sent = rows.filter(e=>e.status==='sent').length;
    const notSent = rows.filter(e=>e.status==='not_sent').length;
    const total = rows.length;
    summaryParts = [
      'Sent: '+sent, 'Not Sent: '+notSent, 'Total Logged: '+total,
      'Send Rate: '+(total? ((sent/total)*100).toFixed(1)+'%' : '—')
    ];
  }
  doc.setFontSize(10);
  doc.text(summaryParts.join('     '), pageWidth/2, 114, {align:'center'});

  // Results table
  const head = isMbl
    ? [['BL Number','Client','Received','Delivered','Turnaround','SLA','Officer','Notes']]
    : [['Date','Client','Status','Officer','Notes']];
  const body = isMbl
    ? rows.map(e=> [e.bl||'—', e.client||'—', fmtDateTime(e.received), fmtDateTime(e.delivered),
        (e.turnaround!==null&&e.turnaround!==undefined? num(e.turnaround,1)+'h':'—'),
        e.late? 'Late':'On-time', e.officer||'—', e.notes||'—'])
    : rows.map(e=>{
        let statusLabel = 'Pending';
        if(e.status==='sent') statusLabel = 'Sent';
        else if(e.status==='not_sent') statusLabel = 'Not sent';
        return [e.date, e.client||'—', statusLabel, e.officer||'—', e.notes||'—'];
      });
  doc.autoTable({
    head, body, startY: 130, styles:{fontSize:8, cellPadding:4},
    headStyles:{fillColor:[30,61,46], textColor:255, fontStyle:'bold'},
    alternateRowStyles:{fillColor:[246,245,241]},
    margin:{left:40, right:40}
  });

  const finalY = (doc.lastAutoTable && doc.lastAutoTable.finalY) || 130;
  doc.setFontSize(8.5);
  doc.setTextColor(120);
  doc.text('Generated '+new Date().toLocaleString()+' by '+loadOfficer(), 40, doc.internal.pageSize.getHeight()-24);

  doc.save('omlin_report_'+rpt.type+'_'+todayStr()+'.pdf');
}

      <div class="field"><label>Client</label><input list="mblClientList" id="mblClient" placeholder="Client name"></div>
      <div class="field"><label>Shipping Line</label><input list="mblLineList" id="mblLine" placeholder="Shipping line"></div>
      <div class="field"><label>BL Number <span class="hint">(required)</span></label><input type="text" id="mblBlNumber" placeholder="Bill of lading number"></div>
    </div>
    <div class="formrow" style="margin-top:10px;">

      <div class="field"><label>MBL Received — Time</label><input type="time" id="mblReceivedTime" value="${nowTime}"></div>
    </div>
    <div class="formrow" style="margin-top:10px;">
      <div class="field"><label>Delivered to Client — Date</label><input type="date" id="mblDeliveredDate" value="${todayStr()}"></div>
      <div class="field"><label>Delivered to Client — Time</label><input type="time" id="mblDeliveredTime" value="${nowTime}"></div>
    </div>
    <div class="formrow" style="margin-top:10px;">
      <div class="field" style="flex:2;"><label>Notes (optional)</label><input type="text" id="mblNotes" placeholder="File number, vessel, etc."></div>
    </div>
    <datalist id="mblClientList">${MASTER.MBL_CLIENT.map(c=>`<option value="${escapeHtml(c.name)}">`).join('')}</datalist>
    <datalist id="mblLineList">${MASTER.MBL_LINE.map(c=>`<option value="${escapeHtml(c.name)}">`).join('')}</datalist>
    <div style="margin-top:14px;">
      <button class="btn primary" onclick="saveMbl()">Save record</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><h2>Logged in this app</h2><p>Most recent first</p></div>
    <div class="tablewrap panel" style="padding:0;">
      <table><thead><tr><th>BL Number</th><th>Delivered</th><th>Client</th><th>Line</th><th>Received</th><th>Turnaround</th><th>SLA</th><th>Officer</th><th></th></tr></thead>
      <tbody>${mblRows()}</tbody></table>
    </div>
  </div>`;
  document.getElementById('page-log-mbl').innerHTML = html;
}
function fmtDateTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) + ' ' +
    d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function mblRows(){
  const rows = loadEntries().filter(e=>e.category==='MBL').sort((a,b)=> (b.delivered||'').localeCompare(a.delivered||''));
  if(!rows.length) return `<tr><td colspan="9" style="font-family:var(--sans);color:var(--ink-soft);">No guarantee deliveries logged yet.</td></tr>`;
  return rows.map(e=>`<tr>
    <td>${escapeHtml(e.bl)||'—'}</td>
    <td>${fmtDateTime(e.delivered)}</td>
    <td style="white-space:normal;">${escapeHtml(e.client)}</td>
    <td>${escapeHtml(e.line)||'—'}</td>
    <td>${fmtDateTime(e.received)}</td>
    <td>${e.turnaround!==null&&e.turnaround!==undefined? num(e.turnaround,1)+'h':'—'}</td>
    <td>${e.late? '<span class="stamp notsent">Late</span>' : '<span class="stamp sent">On-time</span>'}</td>
    <td>${escapeHtml(e.officer)||'—'}</td>
    <td><button class="btn sm ghost" onclick="deleteEntry('${e.id}');renderLogMBL();">Delete</button></td>
  </tr>`).join('');
}
function saveMbl(){
  const client = document.getElementById('mblClient').value.trim();
  const line = document.getElementById('mblLine').value.trim();
  const bl = document.getElementById('mblBlNumber').value.trim();
  const receivedDate = document.getElementById('mblReceivedDate').value;
  const receivedTime = document.getElementById('mblReceivedTime').value;
  const deliveredDate = document.getElementById('mblDeliveredDate').value;
  const deliveredTime = document.getElementById('mblDeliveredTime').value;
  const notes = document.getElementById('mblNotes').value;
  if(!client || !receivedDate || !receivedTime || !deliveredDate || !deliveredTime){
    toast('Client, received date/time and delivered date/time are required'); return;
  }
  if(!bl){ toast('BL number is required'); return; }
  const received = receivedDate+'T'+receivedTime;
  const delivered = deliveredDate+'T'+deliveredTime;
  const receivedDT = new Date(received);
  const deliveredDT = new Date(delivered);
  if(isNaN(receivedDT) || isNaN(deliveredDT)){ toast('Check the received/delivered date and time'); return; }
  const turnaround = Math.round(((deliveredDT - receivedDT) / 3600000) * 10) / 10; // hours, 1dp
  const late = turnaround > 24;
  const entry = {category:'MBL', date: deliveredDate, client, line, bl, received, delivered, turnaround, late,
    status:'logged', officer: loadOfficer(), notes, ts: new Date().toISOString()};
  addEntry(entry);
  toast('Guarantee delivery logged');
  document.getElementById('mblClient').value='';
  document.getElementById('mblLine').value='';
  document.getElementById('mblBlNumber').value='';
  document.getElementById('mblNotes').value='';
  renderLogMBL();
  if(currentPage==='dashboard') renderDashboard();
}

    <table><thead><tr><th>Date</th><th>Category</th><th>Client</th><th>Status</th><th>Officer</th><th>Notes</th><th>Logged At</th><th></th></tr></thead>
    <tbody id="historyRowsBody"></tbody></table>
  </div>`;
  document.getElementById('page-history').innerHTML = html;
  renderHistoryRowsOnly();
}
function renderHistoryRowsOnly(){
  const body = document.getElementById('historyRowsBody');
  if(body) body.innerHTML = historyRows();
}
function filteredEntries(){
  let rows = loadEntries();
  if(historyFilter.cat) rows = rows.filter(e=>e.category===historyFilter.cat);
  if(historyFilter.from) rows = rows.filter(e=>e.date>=historyFilter.from);
  if(historyFilter.to) rows = rows.filter(e=>e.date<=historyFilter.to);
  if(historyFilter.q){
    const q = historyFilter.q.toLowerCase();
    rows = rows.filter(e=> (e.client||'').toLowerCase().includes(q) || (e.officer||'').toLowerCase().includes(q) || (e.notes||'').toLowerCase().includes(q));
  }
  return rows.sort((a,b)=> b.date.localeCompare(a.date) || (b.ts||'').localeCompare(a.ts||''));
}
function historyRows(){
  const rows = filteredEntries();
  if(!rows.length) return `<tr><td colspan="8" style="font-family:var(--sans);color:var(--ink-soft);">No entries match. Try widening your filters, or head to <a class="linklike" onclick="goTo('log-fcl')">Log a Report</a>.</td></tr>`;
  return rows.map(e=>{
    let statusBadge = '<span class="stamp pending">Pending</span>';
    if(e.status==='sent') statusBadge = '<span class="stamp sent">Sent</span>';
    else if(e.status==='not_sent') statusBadge = '<span class="stamp notsent">Not sent</span>';
    else if(e.status==='logged') statusBadge = e.late? '<span class="stamp notsent">Late</span>' : '<span class="stamp logged">Logged</span>';
    return `<tr>
      <td>${e.date}</td>
      <td>${e.category}</td>
      <td style="white-space:normal;">${escapeHtml(e.client)||'—'}</td>
      <td>${statusBadge}</td>
      <td>${escapeHtml(e.officer)||'—'}</td>
      <td style="white-space:normal;">${escapeHtml(e.notes)||'—'}</td>
      <td>${e.ts? new Date(e.ts).toLocaleString():'—'}</td>
      <td><button class="btn sm ghost" onclick="deleteEntry('${e.id}');renderHistoryRowsOnly();">Delete</button></td>
    </tr>`;
  }).join('');
}
function exportCsv(){
  const rows = filteredEntries();
  const header = ['date','category','client','bl','status','officer','notes','received','delivered','turnaround','late','logged_at'];
  const lines = [header.join(',')];
  rows.forEach(e=>{
    const line = header.map(k=>{
      let v = e[k]; if(k==='logged_at') v = e.ts;
      v = (v===undefined||v===null)?'':String(v);
      if(v.includes(',')||v.includes('"')) v = '"'+v.replace(/"/g,'""')+'"';
      return v;
    });
    lines.push(line.join(','));
  });
  downloadFile('omlin_report_log_'+todayStr()+'.csv', lines.join('\n'), 'text/csv');
}

function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}
const FIRESTORE_RULES = `rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}`;

function copyRules(){

}
function exportJson(){
  const payload = {exported_at: new Date().toISOString(), officer: loadOfficer(), entries: loadEntries()};
  downloadFile('omlin_kpi_backup_'+todayStr()+'.json', JSON.stringify(payload, null, 2), 'application/json');
  toast('Backup downloaded');
}
function importJson(mode){
  const file = document.getElementById('importFile').files[0];
  if(!file){ toast('Choose a JSON file first'); return; }
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const payload = JSON.parse(reader.result);
      const incoming = Array.isArray(payload) ? payload : (payload.entries||[]);
      if(mode==='replace'){
        replaceAllEntries(incoming, true);
      } else {
        const current = loadEntries();
        const byId = {}; current.forEach(e=>byId[e.id]=e);
        incoming.forEach(e=>{ byId[e.id||uid()] = e; });
        replaceAllEntries(Object.values(byId), false);
      }
      applyMasterReconciliation(payload);
      toast('Import complete');
      renderData();
    }catch(err){ toast('Could not read that file'); }
  };
  reader.readAsText(file);
}
function applyMasterReconciliation(payload){
  if(payload.master_add){
    Object.keys(payload.master_add).forEach(cat=>{
      if(!MASTER[cat]) return;
      (payload.master_add[cat]||[]).forEach(name=>{
        const exists = MASTER[cat].some(item=>item.name.toLowerCase()===String(name).toLowerCase());
        if(!exists){
          const item = {id:uid(), name:String(name)};
          MASTER[cat].push(item);
          if(CLOUD_MODE) cloudUpsertMaster(cat, item);
        }
      });
    });
  }
  if(payload.master_remove){
    Object.keys(payload.master_remove).forEach(cat=>{
      if(!MASTER[cat]) return;
      const removeNames = new Set((payload.master_remove[cat]||[]).map(n=>String(n).toLowerCase()));
      const toRemove = MASTER[cat].filter(item=>removeNames.has(item.name.toLowerCase()));
      MASTER[cat] = MASTER[cat].filter(item=>!removeNames.has(item.name.toLowerCase()));
      toRemove.forEach(item=>{ if(CLOUD_MODE) cloudDeleteMaster(item.id); });
    });
  }
  if(payload.master_add || payload.master_remove) saveLocalMaster();
}
function clearAll(){
  const warnWho = CLOUD_MODE ? 'for every officer, on every device' : 'on this device';
  if(!confirm(`This deletes every logged entry ${warnWho}. This cannot be undone. Continue?`)) return;
  if(!confirm('Are you absolutely sure? Consider exporting a backup first.')) return;
  ENTRIES = [];
  saveLocalEntries(ENTRIES);
  if(CLOUD_MODE) cloudClearAll().then(()=>updateSyncBadge());
  toast('All logged data cleared');
  renderData();
}

/* ============================================================
   AUTH — Name + Password login screen gating the whole app
   ============================================================ */
let signupMode = false;

function nameToEmail(name){
  const slug = String(name).trim().toLowerCase().replace(/[^a-z0-9]+/g,'.').replace(/^\.+|\.+$/g,'');
  return (slug || 'user') + '@omlin-app.local';
}
function friendlyAuthError(e){
  const code = (e && e.code) || '';
  if(code.includes('user-not-found')) return 'No account with that name yet. Try "Create an account" below.';
  if(code.includes('wrong-password')) return 'Incorrect password.';
  if(code.includes('email-already-in-use')) return 'That name is already registered. Try logging in instead.';
  if(code.includes('weak-password')) return 'Password must be at least 6 characters.';
  if(code.includes('invalid-email')) return "That name contains characters that aren't supported — try letters, numbers and spaces.";
  if(code.includes('too-many-requests')) return 'Too many attempts. Please wait a moment and try again.';
  if(code.includes('network-request-failed')) return 'Network error — check your connection and try again.';
  return 'Something went wrong: ' + (e && e.message ? e.message : code);
}
function showLoginError(msg){
  const el = document.getElementById('loginError');
  if(!el) return;
  el.textContent = msg;
  el.style.display = 'block';
}
function toggleSignupMode(){
  signupMode = !signupMode;
  document.getElementById('authSubmitBtn').textContent = signupMode ? 'Create Account' : 'Log In';
  document.getElementById('authToggleLink').textContent = signupMode ? 'Already have an account? Log in' : 'New officer? Create an account';
  document.getElementById('loginHeading').textContent = signupMode ? 'Create your account' : 'Welcome back';
  document.getElementById('accessCodeField').style.display = signupMode ? 'block' : 'none';
  document.getElementById('loginError').style.display = 'none';
}
function submitAuthForm(){
  const name = document.getElementById('loginName').value.trim();
  const password = document.getElementById('loginPassword').value;
  document.getElementById('loginError').style.display = 'none';
  if(!name || !password){ showLoginError('Enter your name and password.'); return; }
  if(!FIREBASE_READY){ showLoginError("Firebase isn't configured yet. Ask an administrator to add FIREBASE_CONFIG near the top of this file."); return; }
  const email = nameToEmail(name);
  const btn = document.getElementById('authSubmitBtn');
  btn.disabled = true;
  const done = ()=>{ btn.disabled = false; };
  if(signupMode){
    const code = document.getElementById('loginAccessCode').value.trim();
    if(!STAFF_ACCESS_CODE || STAFF_ACCESS_CODE === 'CHANGE-ME'){
      showLoginError("Signups are disabled until an administrator sets STAFF_ACCESS_CODE near the top of this file.");
      done(); return;
    }
    if(code !== STAFF_ACCESS_CODE){ showLoginError('Incorrect staff access code.'); done(); return; }
    if(password.length < 6){ showLoginError('Password must be at least 6 characters.'); done(); return; }
    auth.createUserWithEmailAndPassword(email, password)
      .then(cred=> cred.user.updateProfile({displayName:name}))
      .then(()=>{
        // updateProfile mutates the current user object but doesn't re-fire
        // onAuthStateChanged, so refresh anything already rendered from it.
        const el = document.getElementById('whoamiName');
        if(el) el.textContent = loadOfficer();
      })
      .then(done)
      .catch(e=>{ showLoginError(friendlyAuthError(e)); done(); });
  } else {
    auth.signInWithEmailAndPassword(email, password)
      .then(done)
      .catch(e=>{ showLoginError(friendlyAuthError(e)); done(); });
  }
}
function doLogout(){
  if(auth) auth.signOut();
}
function showLoginScreen(){
  const login = document.getElementById('loginScreen');
  const shell = document.getElementById('shell');
  if(login) login.style.display = 'flex';
  if(shell) shell.style.display = 'none';
  if(!FIREBASE_READY){
    document.getElementById('loginName').disabled = true;
    document.getElementById('loginPassword').disabled = true;
    document.getElementById('authSubmitBtn').disabled = true;
    showLoginError("Firebase isn't configured yet. Ask an administrator to add FIREBASE_CONFIG near the top of this file before anyone can log in.");
  }
}
async function onLoginSuccess(){
  const login = document.getElementById('loginScreen');
  const shell = document.getElementById('shell');
  if(login) login.style.display = 'none';
  if(shell) shell.style.display = 'flex';
  document.getElementById('whoamiName').textContent = loadOfficer();

  ENTRIES = loadLocalEntries();
  const localM = loadLocalMaster();
  MASTER = localM || seedMasterFromWorkbook();
  if(!localM) saveLocalMaster();
  buildNav();
  scaffoldPages();
  goTo('dashboard');
  updateSyncBadge();

  if(CLOUD_MODE){
    await refreshFromCloud(false);
    await syncMasterFromCloud();
    if(!pollStarted){
      pollStarted = true;
      setInterval(()=>{ refreshFromCloud(false); syncMasterFromCloud(); }, 3600000);
      window.addEventListener('focus', ()=>{ refreshFromCloud(false); syncMasterFromCloud(); });
    }
  }
}
